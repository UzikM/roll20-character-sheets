<script type="text/worker">
const modMap = { 1: -1, 2: 0, 3: 1, 4: 2, 5: 3 };

const updateMods = (field) => {
  on(`change:${field}`, () => {
    getAttrs([field], (v) => {
      const val = parseInt(v[field]) || 1;
      const mod = modMap[val] ?? -1;
      setAttrs({ [`${field}_mod`]: mod });
    });
  });
};

const updateHealthAndDamage = () => {
  getAttrs(["endurance", "athletics", "fight"], function (v) {
    const end = parseInt(v.endurance) || 1;
    const ath = parseInt(v.athletics) || 1;
    const fight = parseInt(v.fight) || 1;
    const health = end + ath;
    const damage = Math.floor((ath + fight) / 2);
    setAttrs({ "health": health, "damage": damage });
  });
};

["endurance", "analysis", "perception", "cunning", "athletics", "fight"].forEach((field) => {
  updateMods(field);
  on(`change:${field}`, updateHealthAndDamage);
});

on("sheet:opened", () => {
  updateHealthAndDamage();
});
</script>
